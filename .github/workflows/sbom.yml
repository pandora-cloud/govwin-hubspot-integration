name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install cyclonedx-py
        run: pip install cyclonedx-bom
      - name: Generate Python SBOM
        run: |
          cyclonedx-py requirements requirements.lock \
            --output-format json \
            --output-file sbom-python.cdx.json \
            --schema-version 1.5
      - name: Verify SBOM contents
        run: |
          test -s sbom-python.cdx.json
          python -c "import json; d=json.load(open('sbom-python.cdx.json')); print(len(d.get('components', [])), 'components')"
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-python
          path: sbom-python.cdx.json
          retention-days: 90
      - name: Attach SBOM to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" sbom-python.cdx.json --clobber
