name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/
      - name: Unit tests (pytest)
        run: pytest tests/unit -v --tb=short

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Format check
        working-directory: terraform
        run: terraform fmt -recursive -check
        continue-on-error: true
      - name: Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false
      - name: Validate
        working-directory: terraform
        run: terraform validate

  supply-chain:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit and uv
        run: pip install pip-audit uv
      - name: Verify lockfile in sync with uv.lock
        run: |
          uv export --format=requirements-txt --no-dev --no-emit-project 2>/dev/null > /tmp/requirements.lock.expected
          if ! diff -q requirements.lock /tmp/requirements.lock.expected; then
            echo "::error::requirements.lock is out of sync with uv.lock. Run 'make lock' and commit."
            diff requirements.lock /tmp/requirements.lock.expected | head -40
            exit 1
          fi
      - name: Audit (pip-audit, fail on CVEs)
        run: pip-audit -r requirements.lock --disable-pip

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
