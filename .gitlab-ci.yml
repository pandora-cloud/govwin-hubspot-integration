stages:
  - test
  - lint
  - security

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: "true"
  SAST_EXCLUDED_PATHS: ".terraform, .venv, venv, node_modules"

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --quiet -r requirements-dev.txt
  script:
    - python -m pytest tests/ -v --tb=short
  allow_failure: false

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check src/ tests/
  allow_failure: false

supply-chain-audit:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install --quiet pip-audit uv
  script:
    # Verify the committed requirements.lock matches uv.lock; otherwise the
    # audit could pass against a stale snapshot of the dependency graph.
    - uv export --format=requirements-txt --no-dev --no-emit-project 2>/dev/null > /tmp/requirements.lock.expected
    - diff -q requirements.lock /tmp/requirements.lock.expected || (echo "requirements.lock out of sync; run make lock"; diff requirements.lock /tmp/requirements.lock.expected | head -40; exit 1)
    - pip-audit -r requirements.lock --disable-pip
  allow_failure: false
