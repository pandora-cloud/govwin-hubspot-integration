name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/
      - name: Unit tests (pytest)
        run: pytest tests/unit -v --tb=short

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.11.4"
      - name: Format check
        working-directory: terraform
        run: terraform fmt -recursive -check
      - name: Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false
      - name: Validate
        working-directory: terraform
        run: terraform validate
      - name: Bootstrap module init + validate
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

  supply-chain:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit and uv
        run: pip install pip-audit uv
      - name: Verify lockfile in sync with uv.lock
        run: |
          uv export --format=requirements-txt --no-dev --no-emit-project 2>/dev/null > /tmp/requirements.lock.expected
          if ! diff -q requirements.lock /tmp/requirements.lock.expected; then
            echo "::error::requirements.lock is out of sync with uv.lock. Run 'make lock' and commit."
            diff requirements.lock /tmp/requirements.lock.expected | head -40
            exit 1
          fi
      - name: Audit (pip-audit, fail on CVEs)
        run: pip-audit -r requirements.lock --disable-pip

  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # gitleaks-action moved to a paid model for org repos in 2024;
      # trufflehog is free for OSS and as good or better at signal-to-noise.
      # --only-verified suppresses unverified pattern matches so we don't drown
      # in false positives from synthetic secrets in tests/fixtures.
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  fips:
    name: FIPS endpoint resolution
    runs-on: ubuntu-latest
    # Cheap independent gate: prevent any future PR from re-introducing
    # boto3.client(...) calls that bypass src.aws_clients.make_client and
    # therefore lose FIPS endpoint enforcement (NIST 800-53 SC-13).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install runtime deps
        run: pip install -r requirements.lock
      - name: Resolve every AWS service to a FIPS endpoint
        run: PYTHONPATH=. python scripts/verify_fips.py
      - name: Forbid raw boto3.client / boto3.resource in src/
        # If grep finds a hit, exit 1. The negation makes the step fail
        # exactly when a regression slips in.
        run: |
          if grep -rn 'boto3\.client\|boto3\.resource' src/ --include='*.py' | grep -v 'src/aws_clients.py'; then
            echo "::error::Found raw boto3.client/boto3.resource outside src/aws_clients.py. Use make_client / make_resource instead so FIPS + region pinning stay enforced."
            exit 1
          fi
