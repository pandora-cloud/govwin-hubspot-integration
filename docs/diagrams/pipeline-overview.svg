<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" font-family="Helvetica, Arial, sans-serif">
  <!-- GovWin IQ -->
  <rect x="10" y="50" width="180" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" font-size="13" font-weight="bold">Deltek GovWin IQ</text>
  <text x="100" y="98" text-anchor="middle" font-size="10" fill="#555">Government contracting</text>
  <text x="100" y="112" text-anchor="middle" font-size="10" fill="#555">opportunity database</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="90" x2="240" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="80" text-anchor="middle" font-size="9" fill="#888">BD team marks</text>
  <text x="215" y="70" text-anchor="middle" font-size="9" fill="#888">opps for sync</text>

  <!-- This Integration -->
  <rect x="240" y="50" width="180" height="80" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="330" y="78" text-anchor="middle" font-size="13" font-weight="bold">GovWin-HubSpot</text>
  <text x="330" y="93" text-anchor="middle" font-size="13" font-weight="bold">Integration</text>
  <text x="330" y="112" text-anchor="middle" font-size="10" fill="#555">AWS Step Functions</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="90" x2="470" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="80" text-anchor="middle" font-size="9" fill="#888">Auto-sync</text>
  <text x="445" y="70" text-anchor="middle" font-size="9" fill="#888">deals, contacts</text>

  <!-- HubSpot CRM -->
  <rect x="470" y="50" width="180" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="560" y="80" text-anchor="middle" font-size="13" font-weight="bold">HubSpot CRM</text>
  <text x="560" y="98" text-anchor="middle" font-size="10" fill="#555">Deals with 25+</text>
  <text x="560" y="112" text-anchor="middle" font-size="10" fill="#555">custom properties</text>

  <!-- Arrow 3 -->
  <line x1="650" y1="90" x2="700" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="675" y="80" text-anchor="middle" font-size="9" fill="#888">Fill 3 fields,</text>
  <text x="675" y="70" text-anchor="middle" font-size="9" fill="#888">submit to ACE</text>

  <!-- AWS Partner Central -->
  <rect x="700" y="50" width="180" height="80" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="790" y="78" text-anchor="middle" font-size="13" font-weight="bold">AWS Partner</text>
  <text x="790" y="93" text-anchor="middle" font-size="13" font-weight="bold">Central</text>
  <text x="790" y="112" text-anchor="middle" font-size="10" fill="#555">ACE co-selling</text>

  <!-- Labels -->
  <text x="330" y="155" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Automated</text>
  <text x="790" y="155" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Manual review</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
