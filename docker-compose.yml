services:
  localstack:
    # Pin to the last unambiguously community (free) tag. The :latest tag
    # in late 2026 began requiring a paid LOCALSTACK_AUTH_TOKEN to start;
    # 3.8 keeps the integration suite runnable for any contributor with
    # only Docker installed.
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,secretsmanager,sns,sqs
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
      # moto and LocalStack do not implement the FIPS-suffixed hostnames;
      # production keeps FIPS on, but local integration tests need the
      # standard endpoints. The boto3 SDK honors this env var natively.
      - AWS_USE_FIPS_ENDPOINT=false
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    build: .
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - SYNC_STATE_TABLE=govwin-hubspot-dev-sync-state
      - ENTITY_MAPPINGS_TABLE=govwin-hubspot-dev-entity-mappings
      - GOVWIN_SECRET_NAME=govwin-hubspot-dev/govwin
      - HUBSPOT_SECRET_NAME=govwin-hubspot-dev/hubspot
      - GOVWIN_TOKENS_SECRET_NAME=govwin-hubspot-dev/govwin-tokens
      - SNS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:govwin-hubspot-dev-notifications
      - DLQ_URL=http://localstack:4566/000000000000/govwin-hubspot-dev-dlq
      - GOVWIN_MARKED_VERSION=2.2
      - LOG_LEVEL=INFO
      - ENVIRONMENT=dev
      # Match the localstack service: skip FIPS endpoints in local mode.
      - AWS_USE_FIPS_ENDPOINT=false
    volumes:
      - .:/app
    # Only the integration suite belongs here. Unit tests use moto and
    # should run with `make test`; pointing them at LocalStack causes
    # double-creation conflicts because their fixtures create tables that
    # the LocalStack init script already created.
    command: ["python", "-m", "pytest", "tests/integration/", "-v", "--tb=short"]
