<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Helvetica, Arial, sans-serif">
  <!-- AWS Cloud boundary -->
  <rect x="200" y="10" width="700" height="500" rx="8" fill="none" stroke="#AAB7B8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="220" y="30" font-size="12" font-weight="bold" fill="#AAB7B8">AWS Cloud</text>

  <!-- External: GovWin -->
  <rect x="10" y="210" width="160" height="65" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="90" y="234" text-anchor="middle" font-size="12" font-weight="bold">GovWin WSAPI</text>
  <text x="90" y="252" text-anchor="middle" font-size="9" fill="#555">OAuth2 + REST | 4,000/hr</text>

  <!-- External: HubSpot -->
  <rect x="930" y="210" width="160" height="65" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="1010" y="234" text-anchor="middle" font-size="12" font-weight="bold">HubSpot CRM</text>
  <text x="1010" y="252" text-anchor="middle" font-size="9" fill="#555">Bearer token | 100/10s</text>

  <!-- EventBridge -->
  <rect x="480" y="35" width="140" height="42" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.2"/>
  <text x="550" y="54" text-anchor="middle" font-size="11" font-weight="bold">EventBridge</text>
  <text x="550" y="68" text-anchor="middle" font-size="9" fill="#555">Hourly schedule</text>

  <!-- Step Functions -->
  <rect x="450" y="100" width="200" height="42" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.2"/>
  <text x="550" y="118" text-anchor="middle" font-size="11" font-weight="bold">Step Functions</text>
  <text x="550" y="132" text-anchor="middle" font-size="9" fill="#555">Sync workflow orchestrator</text>

  <!-- Arrow: EB -> SF -->
  <line x1="550" y1="77" x2="550" y2="100" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Lambda label -->
  <text x="550" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Lambda Functions (Python 3.12, ARM64)</text>

  <!-- Lambda boxes -->
  <rect x="230" y="178" width="105" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="282" y="195" text-anchor="middle" font-size="9" font-weight="bold">authenticate</text>
  <text x="282" y="208" text-anchor="middle" font-size="8" fill="#666">OAuth2 token</text>

  <rect x="345" y="178" width="105" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="397" y="195" text-anchor="middle" font-size="9" font-weight="bold">discover_changes</text>
  <text x="397" y="208" text-anchor="middle" font-size="8" fill="#666">Find marked opps</text>

  <rect x="460" y="178" width="105" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="512" y="195" text-anchor="middle" font-size="9" font-weight="bold">fetch_opp_details</text>
  <text x="512" y="208" text-anchor="middle" font-size="8" fill="#666">Get full opp data</text>

  <rect x="575" y="178" width="105" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="627" y="195" text-anchor="middle" font-size="9" font-weight="bold">sync_to_hubspot</text>
  <text x="627" y="208" text-anchor="middle" font-size="8" fill="#666">Batch upsert</text>

  <rect x="690" y="178" width="105" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="742" y="195" text-anchor="middle" font-size="9" font-weight="bold">update_sync_state</text>
  <text x="742" y="208" text-anchor="middle" font-size="8" fill="#666">Track progress</text>

  <rect x="805" y="178" width="80" height="38" rx="6" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="845" y="195" text-anchor="middle" font-size="9" font-weight="bold">handle_error</text>
  <text x="845" y="208" text-anchor="middle" font-size="8" fill="#666">Alert + DLQ</text>

  <!-- SF -> Lambdas -->
  <line x1="550" y1="142" x2="550" y2="170" stroke="#666" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="450" y1="142" x2="340" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="470" y1="142" x2="400" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="550" y1="142" x2="512" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="600" y1="142" x2="627" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="630" y1="142" x2="742" y2="178" stroke="#666" stroke-width="0.8"/>

  <!-- Data stores -->
  <rect x="300" y="300" width="150" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.2"/>
  <text x="375" y="322" text-anchor="middle" font-size="11" font-weight="bold">DynamoDB</text>
  <text x="375" y="340" text-anchor="middle" font-size="9" fill="#555">Sync state + entity mappings</text>

  <rect x="300" y="375" width="150" height="55" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.2"/>
  <text x="375" y="397" text-anchor="middle" font-size="11" font-weight="bold">Secrets Manager</text>
  <text x="375" y="415" text-anchor="middle" font-size="9" fill="#555">API credentials + tokens</text>

  <rect x="620" y="300" width="120" height="45" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.2"/>
  <text x="680" y="320" text-anchor="middle" font-size="11" font-weight="bold">SNS</text>
  <text x="680" y="336" text-anchor="middle" font-size="9" fill="#555">Notifications</text>

  <rect x="760" y="300" width="120" height="45" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.2"/>
  <text x="820" y="320" text-anchor="middle" font-size="11" font-weight="bold">SQS</text>
  <text x="820" y="336" text-anchor="middle" font-size="9" fill="#555">Dead letter queue</text>

  <!-- External connections -->
  <line x1="170" y1="242" x2="230" y2="210" stroke="#6c8ebf" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="680" y1="210" x2="930" y2="242" stroke="#82b366" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
