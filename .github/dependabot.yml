version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-runtime:
        patterns:
          - "pydantic*"
          - "httpx*"
          - "boto3*"
          - "tenacity*"
          - "python-dateutil*"
      python-dev:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"
          - "respx*"
          - "moto*"

  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - terraform

  - package-ecosystem: terraform
    directory: /terraform/bootstrap
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - terraform

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
